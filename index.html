<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HR Check-In System</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#0b0f14;
  overflow:hidden;
  font-family:sans-serif;
}

/* Container */
.app-container{
  position:fixed;
  inset:0;
  overflow:hidden;
  background:#0b0f14;
}

/* 👇 เทคนิค "ตัดแถบขาว" */
.iframe-wrap{
  position:absolute;
  top:-48px;        /* 👈 ดันขึ้นเพื่อตัด header */
  left:0;
  width:100%;
  height:calc(100% + 48px);
  overflow:hidden;
}

/* iframe */
iframe{
  width:100%;
  height:100%;
  border:none;
  background:#fff;
}

/* Loader */
.loader{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b0f14;
  z-index:10;
  transition:.5s;
}

.loader.hide{
  opacity:0;
  pointer-events:none;
}

/* loading bar */
.bar{
  width:120px;
  height:10px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}
.bar::after{
  content:'';
  display:block;
  width:40px;
  height:100%;
  background:#22d3ee;
  animation:move 1.2s infinite linear;
}
@keyframes move{
  0%{transform:translateX(-40px)}
  100%{transform:translateX(120px)}
}

/* Mobile safe area */
@supports(padding:max(0px)){
  .app-container{
    padding-top: env(safe-area-inset-top);
  }
}
</style>
</head>

<body>

<div class="app-container">

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="bar"></div>
  </div>

  <!-- iframe -->
  <div class="iframe-wrap">
    <iframe id="appFrame"
      allow="geolocation *; camera *; microphone *"
      src="https://script.google.com/macros/s/AKfycbyn-YtfHZSwlUhoFchslu0V3VYOQFsL50LSZ63icW555HEuWHmhTXyIm_Gv20lhv3tr/exec">
    </iframe>
  </div>

</div>

<script>
const frame = document.getElementById('appFrame');
const loader = document.getElementById('loader');

/* =========================
   Loader control
========================= */
frame.onload = () => {
  setTimeout(()=>{
    loader.classList.add('hide');
  }, 600);
};

/* =========================
   🔒 กัน back (mobile)
========================= */
history.pushState(null,null,location.href);

window.addEventListener('popstate',()=>{
  history.pushState(null,null,location.href);
});

/* =========================
   🔒 กัน reload
========================= */
window.addEventListener('beforeunload',(e)=>{
  e.preventDefault();
  e.returnValue='';
});

/* =========================
   📱 Fix iOS viewport jump
========================= */
window.addEventListener('resize',()=>{
  document.body.style.height = window.innerHeight + 'px';
});
</script>

</body>
</html>
